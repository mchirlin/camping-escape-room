<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Block Net Generator — Minecraft Escape Room</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #1a1a2e;
      color: #e0e0e0;
      min-height: 100vh;
    }

    .controls {
      padding: 20px;
      background: #16213e;
      border-bottom: 2px solid #0f3460;
      display: flex;
      gap: 16px;
      align-items: center;
      flex-wrap: wrap;
    }

    .controls label {
      font-size: 14px;
      font-weight: 600;
    }

    .controls select, .controls input, .controls button {
      padding: 8px 12px;
      border-radius: 6px;
      border: 1px solid #0f3460;
      background: #1a1a2e;
      color: #e0e0e0;
      font-size: 14px;
    }

    .controls select {
      min-width: 200px;
      background: #fff;
      color: #333;
    }

    .controls button {
      background: #e94560;
      border-color: #e94560;
      color: white;
      cursor: pointer;
      font-weight: 600;
    }

    .controls button:hover { background: #c73e54; }

    .controls button.secondary {
      background: #0f3460;
      border-color: #0f3460;
    }

    .controls button.secondary:hover { background: #1a4a8a; }

    #size-label { min-width: 60px; display: inline-block; }

    .preview {
      padding: 20px;
      display: flex;
      flex-wrap: wrap;
      gap: 20px;
      justify-content: center;
    }

    .net-card {
      background: white;
      border-radius: 8px;
      padding: 12px;
      display: inline-block;
    }

    .net-card canvas { display: block; }

    .net-card .block-name {
      text-align: center;
      color: #333;
      font-size: 13px;
      font-weight: 600;
      margin-top: 8px;
    }

    /* Print styles */
    @media print {
      body { background: white; }
      .controls { display: none; }
      .preview { padding: 0; }
      .net-card {
        border-radius: 0;
        padding: 0;
        page-break-inside: avoid;
        break-inside: avoid;
      }
      .net-card .block-name { display: none; }
    }
  </style>
</head>
<body>
  <div class="controls">
    <label for="block-select">Block:</label>
    <select id="block-select"></select>

    <span id="biome-container" style="display:none">
      <label for="biome-select">Biome:</label>
      <select id="biome-select"></select>
    </span>

    <span id="variant-container" style="display:none">
      <label id="variant-label" for="variant-select"></label>
      <select id="variant-select"></select>
    </span>

    <label for="face-size">Face size:</label>
    <select id="face-size">
      <option value="96">1"</option>
      <option value="144">1.5"</option>
      <option value="192" selected>2"</option>
      <option value="240">2.5"</option>
      <option value="288">3"</option>
      <option value="384">4"</option>
    </select>

    <button id="add-btn">Add to Sheet</button>
    <button id="add-all-btn" class="secondary">Add All</button>
    <button id="clear-btn" class="secondary">Clear</button>
    <button id="print-btn" class="secondary">Print</button>
  </div>
  <div class="preview" id="preview"></div>

  <script type="module">
    import { BLOCK_LIBRARY, BIOMES, setCurrentBiome, renderBlockNet, getBlockByName, applyVariant, blockUsesBiomeTint } from '/src/block-net-generator.ts';

    const select = document.getElementById('block-select');
    const biomeContainer = document.getElementById('biome-container');
    const biomeSelect = document.getElementById('biome-select');
    const variantContainer = document.getElementById('variant-container');
    const variantLabel = document.getElementById('variant-label');
    const variantSelect = document.getElementById('variant-select');
    const sizeSelect = document.getElementById('face-size');
    const preview = document.getElementById('preview');

    // Populate block dropdown grouped by category
    const categories = new Map();
    for (const block of BLOCK_LIBRARY) {
      if (!categories.has(block.category)) categories.set(block.category, []);
      categories.get(block.category).push(block);
    }
    for (const [cat, blocks] of categories) {
      const group = document.createElement('optgroup');
      group.label = cat;
      for (const block of blocks) {
        const opt = document.createElement('option');
        opt.value = block.name;
        opt.textContent = block.name;
        group.appendChild(opt);
      }
      select.appendChild(group);
    }

    // Populate biome dropdown
    for (let i = 0; i < BIOMES.length; i++) {
      const opt = document.createElement('option');
      opt.value = String(i);
      opt.textContent = BIOMES[i].name;
      biomeSelect.appendChild(opt);
    }

    function updateVariantDropdown() {
      const block = getBlockByName(select.value);
      // Show/hide biome dropdown
      biomeContainer.style.display = block && blockUsesBiomeTint(block) ? '' : 'none';
      // Show/hide variant dropdown
      if (block?.variants) {
        variantContainer.style.display = '';
        variantLabel.textContent = block.variants.name + ':';
        variantSelect.innerHTML = '';
        for (let i = 0; i < block.variants.options.length; i++) {
          const opt = document.createElement('option');
          opt.value = String(i);
          opt.textContent = block.variants.options[i].label;
          variantSelect.appendChild(opt);
        }
      } else {
        variantContainer.style.display = 'none';
      }
    }

    function getSelectedBlock() {
      const block = getBlockByName(select.value);
      if (!block) return null;
      if (block.variants && variantSelect.value !== '') {
        return applyVariant(block, parseInt(variantSelect.value));
      }
      return block;
    }

    biomeSelect.addEventListener('change', () => {
      setCurrentBiome(BIOMES[parseInt(biomeSelect.value)]);
      updatePreview();
    });

    select.addEventListener('change', () => {
      updateVariantDropdown();
      updatePreview();
    });

    variantSelect.addEventListener('change', updatePreview);

    // Live preview card (always first, updates on select/slider change)
    let liveCard = null;

    async function updatePreview() {
      const block = getSelectedBlock();
      if (!block) return;

      const faceSize = parseInt(sizeSelect.value);
      const canvas = await renderBlockNet(block, faceSize);

      const card = document.createElement('div');
      card.className = 'net-card';
      card.id = 'live-preview';
      card.appendChild(canvas);

      const label = document.createElement('div');
      label.className = 'block-name';
      label.textContent = block.name + ' (preview)';
      card.appendChild(label);

      if (liveCard) liveCard.replaceWith(card);
      else preview.prepend(card);
      liveCard = card;
    }

    async function addBlock(name) {
      const block = getSelectedBlock();
      if (!block) return;

      const faceSize = parseInt(sizeSelect.value);
      const canvas = await renderBlockNet(block, faceSize);

      const card = document.createElement('div');
      card.className = 'net-card';
      card.appendChild(canvas);

      const label = document.createElement('div');
      label.className = 'block-name';
      label.textContent = block.name;
      card.appendChild(label);

      // Insert after live preview
      if (liveCard) liveCard.after(card);
      else preview.appendChild(card);
    }

    sizeSelect.addEventListener('change', updatePreview);

    document.getElementById('add-btn').addEventListener('click', () => {
      addBlock(select.value);
    });

    document.getElementById('add-all-btn').addEventListener('click', async () => {
      for (const block of BLOCK_LIBRARY) {
        await addBlock(block.name);
      }
    });

    document.getElementById('clear-btn').addEventListener('click', () => {
      preview.innerHTML = '';
      liveCard = null;
      updatePreview();
    });

    document.getElementById('print-btn').addEventListener('click', () => {
      window.print();
    });

    // Show first block on load
    updateVariantDropdown();
    updatePreview();
  </script>
</body>
</html>
