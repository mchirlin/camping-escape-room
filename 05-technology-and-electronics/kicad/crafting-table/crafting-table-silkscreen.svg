<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="20mm" height="20mm" viewBox="0 0 20 20">
  <!-- Crafting table outline for PCB silkscreen -->
  <!-- 20mm x 20mm - scale as needed -->
  <!-- All strokes, no fills (silkscreen compatible) -->

  <!-- Outer border (table block) -->
  <rect x="1" y="1" width="18" height="18" fill="none" stroke="black" stroke-width="0.3"/>

  <!-- 3x3 crafting grid -->
  <!-- Grid area: 3mm margin on each side, so grid is 12mm x 12mm starting at (4,4) -->
  <!-- Each cell is 4mm x 4mm -->

  <!-- Row 1 -->
  <rect x="4" y="4" width="4" height="4" fill="none" stroke="black" stroke-width="0.25"/>
  <rect x="8" y="4" width="4" height="4" fill="none" stroke="black" stroke-width="0.25"/>
  <rect x="12" y="4" width="4" height="4" fill="none" stroke="black" stroke-width="0.25"/>

  <!-- Row 2 -->
  <rect x="4" y="8" width="4" height="4" fill="none" stroke="black" stroke-width="0.25"/>
  <rect x="8" y="8" width="4" height="4" fill="none" stroke="black" stroke-width="0.25"/>
  <rect x="12" y="8" width="4" height="4" fill="none" stroke="black" stroke-width="0.25"/>

  <!-- Row 3 -->
  <rect x="4" y="12" width="4" height="4" fill="none" stroke="black" stroke-width="0.25"/>
  <rect x="8" y="12" width="4" height="4" fill="none" stroke="black" stroke-width="0.25"/>
  <rect x="12" y="12" width="4" height="4" fill="none" stroke="black" stroke-width="0.25"/>

  <!-- Horizontal divider line across the middle of the block (table top edge) -->
  <line x1="1" y1="3" x2="19" y2="3" stroke="black" stroke-width="0.2"/>

  <!-- Simple tool hints in top border area (two small crossed lines suggesting tools) -->
  <line x1="3" y1="1.5" x2="5" y2="2.8" stroke="black" stroke-width="0.2"/>
  <line x1="5" y1="1.5" x2="3" y2="2.8" stroke="black" stroke-width="0.2"/>

  <line x1="15" y1="1.5" x2="17" y2="2.8" stroke="black" stroke-width="0.2"/>
  <line x1="17" y1="1.5" x2="15" y2="2.8" stroke="black" stroke-width="0.2"/>
</svg>
